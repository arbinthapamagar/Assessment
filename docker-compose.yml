services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    # only exposed locally for debugging — not needed by other containers
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      MONGODB_URI: mongodb://mongo:27017
      CORS_ORIGIN: http://localhost:3000
      BASE_URL: http://localhost:8000
    depends_on:
      - mongo

  frontend:
    build: ./frontend/urlShorten
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
